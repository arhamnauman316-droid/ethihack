<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ethihack — Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #030303;
            --bg-card: #09090b;
            --border-subtle: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-indigo: #6366f1;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-main); color: var(--text-secondary); font-family: var(--font-sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .ambient { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100vw; height: 100vh; background: radial-gradient(circle 600px at 50% 0%, rgba(99,102,241,0.1), transparent 70%); pointer-events: none; z-index: 0; }
        .card { position: relative; z-index: 1; width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 40px; }
        .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
        .logo-dot { width: 8px; height: 8px; background: var(--accent-indigo); border-radius: 50%; box-shadow: 0 0 10px var(--accent-indigo); }
        .logo-name { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .tabs { display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 3px; margin-bottom: 28px; }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-secondary); transition: all .2s; }
        .tab.active { background: var(--accent-indigo); color: #fff; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); color: var(--text-primary); font-size: 14px; padding: 10px 14px; border-radius: 8px; outline: none; font-family: var(--font-sans); transition: border-color .2s; }
        input:focus { border-color: var(--accent-indigo); }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .btn { width: 100%; background: var(--accent-indigo); color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background .2s; font-family: var(--font-sans); }
        .btn:hover { background: #4f46e5; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .msg { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
        .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; display: block; }
        .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; display: block; }
        .divider { text-align: center; font-size: 12px; color: var(--text-secondary); margin: 20px 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border-subtle); }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .back { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
        .back a { color: var(--accent-indigo); text-decoration: none; }
    </style>
</head>
<body>
    <div class="ambient"></div>
    <div class="card">
        <div class="logo"><div class="logo-dot"></div><span class="logo-name">ethihack</span></div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('signup')">Create Account</div>
        </div>
        <div id="login-form">
            <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@company.com"></div>
            <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
            <button class="btn" onclick="login()">Sign In</button>
        </div>
        <div id="signup-form" style="display:none">
            <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@company.com"></div>
            <div class="field"><label>Password</label><input type="password" id="signup-pass" placeholder="At least 8 characters"></div>
            <div class="field"><label>Confirm Password</label><input type="password" id="signup-pass2" placeholder="Repeat password"></div>
            <button class="btn" onclick="signup()">Create Account</button>
        </div>
        <div id="msg" class="msg"></div>
        <div class="divider">or</div>
        <div class="back"><a href="/">← Back to home</a></div>
    </div>
    <script>
        const supabase = window.supabase.createClient('https://buaomfmxwbiyaxlzvlmt.supabase.co', 'sb_publishable_W89rHMUJZzdglLVkGOcOZA_6MxxQxnn');

        // If already logged in redirect to scan
        supabase.auth.getSession().then(({data}) => {
            if(data.session) window.location.href = '/scan';
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
            document.getElementById('login-form').style.display = tab==='login'?'block':'none';
            document.getElementById('signup-form').style.display = tab==='signup'?'block':'none';
            document.getElementById('msg').className = 'msg';
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!email||!pass) return showMsg('Please fill in all fields.', 'error');
            showMsg('Signing in...', 'success');
            const {error} = await supabase.auth.signInWithPassword({email, password: pass});
            if(error) return showMsg(error.message, 'error');
            showMsg('Success! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/scan', 800);
        }

        async function signup() {
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-pass').value;
            const pass2 = document.getElementById('signup-pass2').value;
            if(!email||!pass) return showMsg('Please fill in all fields.', 'error');
            if(pass !== pass2) return showMsg('Passwords do not match.', 'error');
            if(pass.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
            showMsg('Creating account...', 'success');
            const {error} = await supabase.auth.signUp({email, password: pass});
            if(error) return showMsg(error.message, 'error');
            showMsg('Account created! Check your email to confirm.', 'success');
        }
    </script>
</body>
</html>
